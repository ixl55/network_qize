<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CyberExam — Network Security Platform</title>
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@0,300;0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
        <style>
            :root {
                --bg: #05070e;
                --bg-2: #0a0e1a;
                --card: #0f1424;
                --card-2: #141a2e;
                --border: #1d2845;
                --border-2: #2a3a5f;
                --accent: #00d4ff;
                --accent-2: #00ffa3;
                --purple: #a855f7;
                --neon-green: #39ff88;
                --neon-blue: #2de2ff;
                --neon-purple: #b678ff;
                --text: #e2e8f0;
                --text-dim: #94a3b8;
                --text-muted: #64748b;
                --danger: #ff3b6b;
                --warning: #fbbf24;
                --success: #10b981;
                --green-bg: rgba(57,255,136,.1);
                --green-bd: rgba(57,255,136,.4);
                --red-bg: rgba(255,59,107,.1);
                --red-bd: rgba(255,59,107,.4);
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html, body {
                height: 100%;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: 'DM Sans',sans-serif;
                font-size: 15px;
                line-height: 1.65;
                overflow-x: hidden;
                min-height: 100vh;
            }

            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background-image: linear-gradient(rgba(0,212,255,0.035) 1px,transparent 1px), linear-gradient(90deg,rgba(0,212,255,0.035) 1px,transparent 1px);
                background-size: 56px 56px;
                pointer-events: none;
                z-index: 0;
                mask-image: radial-gradient(ellipse at center,#000 0%,transparent 75%);
                -webkit-mask-image: radial-gradient(ellipse at center,#000 0%,transparent 75%);
            }

            body::after {
                content: '';
                position: fixed;
                inset: 0;
                background: radial-gradient(ellipse 60% 40% at 15% 10%,rgba(45,226,255,.08),transparent 60%), radial-gradient(ellipse 60% 40% at 85% 90%,rgba(182,120,255,.08),transparent 60%), radial-gradient(ellipse 40% 30% at 50% 50%,rgba(57,255,136,.04),transparent 60%);
                pointer-events: none;
                z-index: 0;
            }

            ::-webkit-scrollbar {
                width: 10px;
                height: 10px;
            }

            ::-webkit-scrollbar-track {
                background: #0a0e1a;
            }

            ::-webkit-scrollbar-thumb {
                background: linear-gradient(180deg,#1d2845,#2a3a5f);
                border-radius: 8px;
            }

            .screen {
                position: relative;
                z-index: 1;
                min-height: 100vh;
                display: none;
                animation: fadeIn .5s ease;
            }

            .screen.active {
                display: block;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(8px)
                }

                to {
                    opacity: 1;
                    transform: translateY(0)
                }
            }

            @keyframes slideUpCard {
                from {
                    opacity: 0;
                    transform: translateY(30px)
                }

                to {
                    opacity: 1;
                    transform: translateY(0)
                }
            }

            /* ========== BUTTONS ========== */
            .btn {
                appearance: none;
                border: none;
                cursor: pointer;
                font: 600 14px 'DM Sans',sans-serif;
                letter-spacing: .02em;
                padding: 14px 22px;
                border-radius: 10px;
                transition: transform .15s,box-shadow .2s,filter .2s;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
            }

            .btn:active {
                transform: translateY(1px);
            }

            .btn-primary {
                background: linear-gradient(135deg,var(--neon-blue) 0%,var(--accent) 60%,var(--neon-purple) 120%);
                color: #061018;
                font-weight: 700;
                box-shadow: 0 10px 30px -8px rgba(45,226,255,.35),0 0 0 1px rgba(45,226,255,.3) inset;
            }

            .btn-primary:hover {
                filter: brightness(1.1);
                box-shadow: 0 14px 38px -8px rgba(45,226,255,.5);
            }

            .btn-ghost {
                background: rgba(255,255,255,.03);
                color: var(--text);
                border: 1px solid var(--border);
            }

            .btn-ghost:hover {
                background: rgba(255,255,255,.06);
                border-color: var(--border-2);
            }

            .btn-danger {
                background: var(--red-bg);
                color: var(--danger);
                border: 1px solid var(--red-bd);
            }

            /* ========== LANDING ========== */
            .landing {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 32px 20px;
            }

            .landing-box {
                width: 100%;
                max-width: 560px;
                background: linear-gradient(180deg,var(--card) 0%,var(--card-2) 100%);
                border: 1px solid var(--border);
                border-radius: 20px;
                padding: 44px 40px 36px;
                box-shadow: 0 30px 80px -20px rgba(0,0,0,.6),0 0 0 1px rgba(45,226,255,.04) inset;
            }

            .logo {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                padding: 6px 14px;
                border-radius: 100px;
                background: rgba(45,226,255,.08);
                border: 1px solid rgba(45,226,255,.25);
                color: var(--neon-blue);
                font-family: 'DM Mono',monospace;
                font-size: 11px;
                letter-spacing: .22em;
                text-transform: uppercase;
                margin-bottom: 22px;
            }

            .landing h1 {
                font-family: 'Syne',sans-serif;
                font-weight: 800;
                font-size: clamp(30px,5.2vw,44px);
                line-height: 1.08;
                margin-bottom: 14px;
                background: linear-gradient(135deg,#fff 30%,var(--neon-blue) 75%,var(--neon-purple) 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .field {
                display: grid;
                gap: 8px;
                margin-bottom: 20px;
            }

            .field label {
                font-family: 'DM Mono',monospace;
                font-size: 11px;
                letter-spacing: .18em;
                text-transform: uppercase;
                color: var(--text-dim);
            }

            .field input {
                background: #0a0f1e;
                border: 1px solid var(--border);
                color: var(--text);
                padding: 14px 16px;
                border-radius: 10px;
                font: 500 15px 'DM Sans',sans-serif;
                transition: all .2s;
                width: 100%;
            }

            .field input:focus {
                outline: none;
                border-color: var(--neon-blue);
                box-shadow: 0 0 0 4px rgba(45,226,255,.12);
                background: #0c1324;
            }

            /* ========== EXAM UI ========== */
            .exam-topbar {
                position: sticky;
                top: 0;
                z-index: 20;
                background: rgba(5,7,14,.85);
                backdrop-filter: blur(14px);
                border-bottom: 1px solid var(--border);
            }

            .topbar-inner {
                max-width: 980px;
                margin: 0 auto;
                padding: 14px 20px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .user-chip {
                display: flex;
                align-items: center;
                gap: 8px;
                font-weight: 600;
                color: var(--neon-blue);
            }



            .progress-bar {
                height: 3px;
                background: #0a0f1e;
                width: 100%;
            }

            .progress-fill {
                height: 100%;
                width: 0%;
                background: linear-gradient(90deg,var(--neon-blue),var(--neon-green));
                transition: width 0.4s ease;
            }

            .exam-main {
                max-width: 900px;
                margin: 0 auto;
                padding: 28px 20px 120px;
            }

            .exam-meta {
                font-family: 'DM Mono',monospace;
                font-size: 12px;
                color: var(--text-dim);
                margin-bottom: 20px;
                text-align: center;
                letter-spacing: 1px;
                text-transform: uppercase;
            }

            /* 5-Q Cards */
            .q-card {
                background: linear-gradient(180deg,var(--card) 0%,var(--card-2) 100%);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 28px;
                margin-bottom: 24px;
                box-shadow: 0 20px 60px -30px rgba(0,0,0,.8);
                opacity: 0;
                animation: slideUpCard 0.5s ease forwards;
            }

            .q-text {
                font-family: 'Syne',sans-serif;
                font-weight: 600;
                font-size: 18px;
                color: #f1f5f9;
                margin-bottom: 20px;
            }

            .opts {
                display: grid;
                gap: 10px;
            }

            .opt-btn {
                display: flex;
                align-items: center;
                gap: 14px;
                padding: 14px 16px;
                border-radius: 11px;
                border: 1px solid var(--border);
                background: rgba(255,255,255,.015);
                color: var(--text);
                cursor: pointer;
                font-size: 15px;
                text-align: left;
                transition: all .2s;
                width: 100%;
            }

            .opt-btn:hover:not(:disabled) {
                background: rgba(255,255,255,.05);
                border-color: var(--border-2);
                transform: translateY(-1px);
            }

            /* Immediate Feedback Classes */
            .opt-btn.correct-imm {
                background: var(--green-bg) !important;
                border-color: var(--neon-green) !important;
                color: #fff;
            }

            .opt-btn.incorrect-imm {
                background: var(--red-bg) !important;
                border-color: var(--danger) !important;
                color: #fff;
            }

            .opt-btn:disabled:not(.correct-imm):not(.incorrect-imm) {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .feedback-msg {
                margin-top: 15px;
                font-weight: 600;
                padding: 12px;
                border-radius: 8px;
                background: var(--bg-2);
                text-align: center;
                font-size: 14px;
                animation: fadeIn 0.3s ease;
            }

            /* Navigation Bottom Bar */
            .nav-bar {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 15;
                background: rgba(5,7,14,.9);
                border-top: 1px solid var(--border);
                padding: 14px 20px;
            }

            .nav-inner {
                max-width: 900px;
                margin: 0 auto;
                display: flex;
                justify-content: space-between;
                gap: 10px;
            }

            /* ========== RESULTS ========== */
            .score-hero {
                text-align: center;
                padding: 40px;
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 20px;
                margin-bottom: 20px;
            }

            .score-pct {
                font: 800 50px 'Syne',sans-serif;
                background: linear-gradient(135deg,#fff,var(--neon-green));
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .history-list {
                display: grid;
                gap: 8px;
                margin-top: 15px;
            }

            .history-item {
                background: var(--bg-2);
                padding: 10px;
                border-radius: 8px;
                border: 1px solid var(--border);
                font-size: 13px;
                display: flex;
                justify-content: space-between;
            }

            .hidden {
                display: none !important;
            }
        </style>
    </head>
    <body>
        <div id="loginScreen" class="screen active">
            <div class="landing">
                <div class="landing-box">
                    <div class="logo">
                        Cyber<span style="color:var(--text-muted)">//</span>
                        Exam
                    </div>
                    <h1>Certification Protocol</h1>
                    <p style="color:var(--text-dim); margin-bottom:25px;">Enter your credentials to begin the adaptive assessment.</p>
                    <div class="field">
                        <label>Candidate Name</label>
                        <input type="text" id="studentNameInput" placeholder="e.g. Alex Carter"/>
                    </div>
                    <button class="btn btn-primary" id="startBtn" style="width:100%">Initialize Exam →</button>
                </div>
            </div>
        </div>
        <div id="examScreen" class="screen">
            <div class="exam-topbar">
                <div class="topbar-inner">
                    <div class="user-chip">
                        👤 <span id="displayStudentName"></span>
                    </div>

                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            <div class="exam-main">
                <div class="exam-meta" id="pageCounter">QUESTIONS 1-5 / X</div>
                <div id="questionsContainer"></div>
            </div>
            <div class="nav-bar">
                <div class="nav-inner">
                    <button class="btn btn-ghost" id="prevBtn">← Previous Page</button>
                    <button class="btn btn-primary" id="nextBtn">Next Page →</button>
                    <button class="btn btn-danger hidden" id="submitBtn">Submit Exam</button>
                </div>
            </div>
        </div>
        <div id="resultScreen" class="screen">
            <div class="exam-main">
                <div class="score-hero">
                    <h2 style="color:var(--text-dim); font-family:'DM Mono'; letter-spacing:2px;">EXECUTION COMPLETE</h2>
                    <div class="score-pct" id="finalScore">0%</div>
                    <p style="margin-top:10px; font-size:16px;">
                        Candidate: <strong id="resultName" style="color:var(--neon-blue)"></strong>
                    </p>

                    <div style="display:flex; justify-content:center; gap:20px; margin-top:20px;">
                        <div style="color:var(--neon-green)">
                            Correct: <span id="resultCorrect">0</span>
                        </div>
                        <div style="color:var(--danger)">
                            Incorrect: <span id="resultIncorrect">0</span>
                        </div>
                    </div>
                    <div style="margin-top:30px; display:flex; gap:10px; justify-content:center;">
                        <button class="btn btn-primary" id="retryBtn">Retry Exam</button>
                        <button class="btn btn-ghost" id="logoutBtn">Log Out</button>
                    </div>
                </div>
                <div style="margin-top:20px;">
                    <h3 style="font-family:'Syne'; color:var(--neon-blue);">📜 Previous Attempts</h3>
                    <div id="historyContainer" class="history-list"></div>
                </div>
            </div>
        </div>
        <script>
            // ======================================================================
            // ⬇️ PASTE YOUR 237 QUESTIONS IN THIS ARRAY ⬇️
            // Keep the exact same format: { q: "...", opts: ["A","B","C","D"], a: "Correct" }
            // ======================================================================
            const rawQuestions = [// --- Network Security - Study Sheet (30 Questions) ---
            {
                q: "Which security service is provided by ESP but NOT by AH?",
                opts: ["Access control", "Confidentiality", "Message authentication", "Replay attack protection"],
                a: "Confidentiality"
            }, {
                q: "Which set of services is common to BOTH AH and ESP?",
                opts: ["Confidentiality, Access control, Replay attack protection", "Confidentiality only", "Entity authentication and Confidentiality", "Access control, Message authentication, Entity authentication, Replay attack protection"],
                a: "Access control, Message authentication, Entity authentication, Replay attack protection"
            }, {
                q: "What protocol does IPsec use to automatically create Security Associations in large VPNs?",
                opts: ["SSL/TLS", "Diffie-Hellman Protocol directly", "Internet Key Exchange (IKE)", "RSA Key Exchange Protocol"],
                a: "Internet Key Exchange (IKE)"
            }, {
                q: "During the first exchange of IKE Phase 1, which algorithm creates the bi-directional IKE SA?",
                opts: ["Diffie-Hellman key exchange", "RSA public-key encryption", "AES symmetric encryption", "Digital Signature Algorithm (DSA)"],
                a: "Diffie-Hellman key exchange"
            }, {
                q: "What important secret is established during IKE Phase 1 for later use in Phase 2?",
                opts: ["The public certificates of both routers", "A master secret used to compute IPSec SA keys in Phase 2", "The SPIs for each SA", "Session cookies"],
                a: "A master secret used to compute IPSec SA keys in Phase 2"
            }, {
                q: "What happens during the second exchange of IKE Phase 1 that did NOT happen in the first?",
                opts: ["Diffie-Hellman keys are generated for the first time", "The two routers exchange routing tables", "Both sides reveal their identity by signing messages, and negotiate IPsec algorithms", "SA keys are destroyed and regenerated"],
                a: "Both sides reveal their identity by signing messages, and negotiate IPsec algorithms"
            }, {
                q: "What is the primary motivation for IKE using TWO phases instead of one?",
                opts: ["RFC 5996 formatting requirements", "To allow different algorithms in each phase", "To ensure SA keys are at least 256 bits long", "Phase 2 avoids public-key crypto, allowing many SAs to be generated cheaply"],
                a: "Phase 2 avoids public-key crypto, allowing many SAs to be generated cheaply"
            }, {
                q: "What is the outcome at the end of IKE Phase 2?",
                opts: ["An SA in each direction, with encryption and authentication session keys", "Only one unidirectional SA from R1 to R2", "The IKE SA is terminated and all keys discarded", "SAD entries are deleted"],
                a: "An SA in each direction, with encryption and authentication session keys"
            }, {
                q: "A firewall is best described as:",
                opts: ["Software only, running on a dedicated server", "A combination of hardware and software that isolates an organization's internal network from the Internet", "A purely logical construct implemented in application-layer software", "A cryptographic protocol"],
                a: "A combination of hardware and software that isolates an organization's internal network from the Internet"
            }, {
                q: "Which of the following is NOT one of the three goals of a firewall?",
                opts: ["All traffic passes through the firewall", "Only authorized traffic is allowed to pass", "The firewall encrypts all inbound packets before forwarding them internally", "The firewall itself is immune to penetration"],
                a: "The firewall encrypts all inbound packets before forwarding them internally"
            }, {
                q: "Firewalls are classified into how many categories, and what are they?",
                opts: ["Two: hardware and software", "Two: packet filters and application gateways", "Four: packet filters, stateful filters, application gateways, and IDS", "Three: traditional packet filters, stateful filters, and application gateways"],
                a: "Three: traditional packet filters, stateful filters, and application gateways"
            }, {
                q: "A traditional packet filter examines packets in what manner?",
                opts: ["In the context of ongoing TCP sessions", "Each datagram in isolation, based on administrator-specific rules", "By inspecting the full application payload", "Only outbound packets"],
                a: "Each datagram in isolation, based on administrator-specific rules"
            }, {
                q: "Which of the following is NOT a typical basis for packet-filter decisions?",
                opts: ["The authenticated username of the sender", "IP source or destination address", "Protocol type", "TCP or UDP source and destination port"],
                a: "The authenticated username of the sender"
            }, {
                q: "To block externally-initiated TCP connections while permitting internally-initiated ones, a filter should:",
                opts: ["Block all packets with destination port 80", "Block all UDP packets", "Filter all incoming TCP segments with the ACK bit set to 0", "Block all ICMP messages"],
                a: "Filter all incoming TCP segments with the ACK bit set to 0"
            }, {
                q: "What does the restrictive access control list in Table 8.6 ultimately allow through?",
                opts: ["All TCP and UDP traffic", "Only Web (HTTP) traffic initiated from within the organization, and DNS traffic", "All inbound traffic with ACK=1", "Telnet, HTTP, and DNS traffic"],
                a: "Only Web (HTTP) traffic initiated from within the organization, and DNS traffic"
            }, {
                q: "To prevent the network from being tracerouted by outsiders, a filter should:",
                opts: ["Block all TCP SYN segments from outside", "Block all inbound UDP packets", "Drop all ICMP ping packets", "Block all outgoing ICMP TTL expired messages"],
                a: "Block all outgoing ICMP TTL expired messages"
            }, {
                q: "How do stateful filters differ from traditional packet filters?",
                opts: ["Stateful filters track all ongoing TCP connections in a connection table", "Stateful filters inspect application-layer data", "Stateful filters only filter UDP traffic", "Stateful filters operate at the physical layer"],
                a: "Stateful filters track all ongoing TCP connections in a connection table"
            }, {
                q: "How does a stateful firewall detect the beginning of a new TCP connection?",
                opts: ["It monitors DNS queries", "It requires users to register connections", "By observing the three-way handshake (SYN, SYNACK, ACK)", "By inspecting HTTP headers"],
                a: "By observing the three-way handshake (SYN, SYNACK, ACK)"
            }, {
                q: "An attacker sends a forged packet with TCP source port 80 and ACK=1, not part of any real connection. What does the stateful filter do?",
                opts: ["Allows it because source port 80 is trusted", "Checks the connection table, finds no matching entry, and rejects the packet", "Forwards it to the application gateway", "Allows it because ACK=1"],
                a: "Checks the connection table, finds no matching entry, and rejects the packet"
            }, {
                q: "An application gateway is needed when an organization wants to:",
                opts: ["Block all TCP SYN packets", "Prevent UDP radio", "Filter based on IP and port alone", "Provide Telnet access to restricted internal users who must first authenticate"],
                a: "Provide Telnet access to restricted internal users who must first authenticate"
            }, {
                q: "What does an application gateway inspect that packet filters do NOT?",
                opts: ["Application-layer data, beyond the IP/TCP/UDP headers", "The physical MAC address", "Only the IP source address", "Routing table entries"],
                a: "Application-layer data, beyond the IP/TCP/UDP headers"
            }, {
                q: "In a Telnet application gateway setup, how is the router's packet filter configured?",
                opts: ["Allow all Telnet connections", "Block all Telnet traffic", "Block all Telnet connections except those originating from the application gateway's IP address", "Redirect all Telnet to port 443"],
                a: "Block all Telnet connections except those originating from the application gateway's IP address"
            }, {
                q: "Once a user is granted Telnet permission, what three steps does the gateway perform?",
                opts: ["Generates a session key, encrypts, forwards directly", "Prompts for the external hostname, sets up a Telnet session to it, and relays data bidirectionally", "Saves credentials, opens VPN, terminates after 30 min", "Logs session, sends SNMP alert, forwards TCP"],
                a: "Prompts for the external hostname, sets up a Telnet session to it, and relays data bidirectionally"
            }, {
                q: "What capability does an IDS have that traditional/stateful packet filters do NOT?",
                opts: ["Blocking packets based on IP", "Inspecting TCP flag bits", "Authenticating users", "Deep packet inspection examining the actual application data"],
                a: "Deep packet inspection examining the actual application data"
            }, {
                q: "What is the difference between an IDS and an IPS?",
                opts: ["An IDS generates alerts; an IPS actively filters out traffic", "An IDS blocks traffic; an IPS only blocks known signatures", "An IDS operates at application layer; IPS at network layer", "No technical difference"],
                a: "An IDS generates alerts; an IPS actively filters out traffic"
            }, {
                q: "Which BEST describes the full range of attacks an IDS can detect?",
                opts: ["Only DoS and port scans", "Only worms and viruses", "Network mapping, port scans, TCP stack scans, DoS flooding, worms, OS/app vulnerability attacks", "Only attacks from outside the DMZ"],
                a: "Network mapping, port scans, TCP stack scans, DoS flooding, worms, OS/app vulnerability attacks"
            }, {
                q: "In the network architecture described, what is the Demilitarized Zone (DMZ)?",
                opts: ["High-security zone", "A lower-security region protected only by the packet filter, hosting servers that communicate with the outside world", "Unmonitored region", "Region without IDS sensors"],
                a: "A lower-security region protected only by the packet filter, hosting servers that communicate with the outside world"
            }, {
                q: "When multiple IDS sensors are deployed, how do they operate?",
                opts: ["Independently", "Only closest sensor sends alerts", "Compete to detect first", "In concert, sending suspicious traffic info to a central IDS processor"],
                a: "In concert, sending suspicious traffic info to a central IDS processor"
            }, {
                q: "Why is a compromised firewall described as potentially 'worse than no firewall at all'?",
                opts: ["It provides a false sense of security", "It injects malicious packets", "It deletes SAD entries", "It disables IDS sensors"],
                a: "It provides a false sense of security"
            }, {
                q: "Which public-domain IDS system is specifically mentioned as 'immensely popular'?",
                opts: ["Wireshark", "nmap", "Snort", "iptables"],
                a: "Snort"
            },
            // --- Computer Network Security-Practical Questions Bank (50 Questions) ---
            {
                q: "A company wants to ensure data is not altered during transmission. Which principle is this?",
                opts: ["Authentication", "Availability", "Integrity", "Confidentiality"],
                a: "Integrity"
            }, {
                q: "Using HTTPS instead of HTTP primarily ensures:",
                opts: ["Data encryption", "IP masking", "Data compression", "Faster communication"],
                a: "Data encryption"
            }, {
                q: "Which attack targets availability?",
                opts: ["SQL Injection", "DDoS", "MITM", "Phishing"],
                a: "DDoS"
            }, {
                q: "Hashing is mainly used for:",
                opts: ["Compression", "Encryption", "Authentication", "Data integrity"],
                a: "Data integrity"

                a: "Secure remote access - user with IP security protocols connects to ISP and gains secure company network access"
            }, {
                q: "Transport Mode ESP is primarily used to:",
                opts: ["Encrypt an entire IP packet including its original IP header", "Encrypt and optionally authenticate the data payload carried by IP (e.g., a TCP segment) between two hosts", "Create a new IP header for routing across the public Internet", "Compress IP packets to reduce bandwidth usage"],
                a: "Encrypt and optionally authenticate the data payload carried by IP (e.g., a TCP segment) between two hosts"

                opts: ["It cannot support IPv6", "It requires public key certificates for all parties", "Traffic analysis is still possible because the original IP header remains visible and unencrypted", "It encrypts so much data that intermediate routers cannot forward packets"],

                a: "Examine and process the IP header plus any plaintext IP extension headers - but NOT examine the ciphertext"

            // ======================================================================
            // ENGINE CONFIGURATION
            // ======================================================================
            const QUESTIONS_PER_PAGE = 5;

            let state = {
                studentName: '',
                questions: [],
                answers: {},
                currentPage: 0
            };

            const el = {
                login: document.getElementById('loginScreen'),
                exam: document.getElementById('examScreen'),
                result: document.getElementById('resultScreen'),
                nameInput: document.getElementById('studentNameInput'),
                startBtn: document.getElementById('startBtn'),
                dispName: document.getElementById('displayStudentName'),
                pageCount: document.getElementById('pageCounter'),
                progFill: document.getElementById('progressFill'),
                container: document.getElementById('questionsContainer'),
                prevBtn: document.getElementById('prevBtn'),
                nextBtn: document.getElementById('nextBtn'),
                submitBtn: document.getElementById('submitBtn')
            };

            function shuffle(arr) {
                let ci = arr.length, ri;
                while (ci !== 0) {
                    ri = Math.floor(Math.random() * ci);
                    ci--;
                    [arr[ci],arr[ri]] = [arr[ri], arr[ci]];
                }
                return arr;
            }

            // Start Exam
            el.startBtn.onclick = () => {
                const n = el.nameInput.value.trim();
                if (!n)
                    return alert("Enter credentials.");

                let pool = JSON.parse(JSON.stringify(rawQuestions));
                pool = shuffle(pool);
                pool.forEach(q => {
                    q.opts = shuffle(q.opts);
                }
                );

                state.studentName = n;
                state.questions = pool;
                state.answers = {};
                state.currentPage = 0;


                el.login.classList.remove('active');
                el.exam.classList.add('active');
                el.dispName.textContent = n;


                renderPage();
            }
            ;



            function renderPage() {
                el.container.innerHTML = '';
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });

                const startIdx = state.currentPage * QUESTIONS_PER_PAGE;
                const endIdx = Math.min(startIdx + QUESTIONS_PER_PAGE, state.questions.length);
                const totalPages = Math.ceil(state.questions.length / QUESTIONS_PER_PAGE);

                el.pageCount.textContent = `QUESTIONS ${startIdx + 1}-${endIdx} / ${state.questions.length}`;
                el.progFill.style.width = `${((state.currentPage + 1) / totalPages) * 100}%`;

                // Generate 5 cards
                for (let i = startIdx; i < endIdx; i++) {
                    const q = state.questions[i];
                    const userAns = state.answers[i];

                    // Staggered animation delay based on position on the page
                    const delay = (i - startIdx) * 0.1;

                    const card = document.createElement('div');
                    card.className = 'q-card';
                    card.style.animationDelay = `${delay}s`;

                    card.innerHTML = `<div class="q-text"><span style="color:var(--neon-blue)">Q${i + 1}.</span> ${q.q}</div>`;
                    const optsDiv = document.createElement('div');
                    optsDiv.className = 'opts';

                    q.opts.forEach(opt => {
                        const btn = document.createElement('button');
                        btn.className = 'opt-btn';
                        btn.textContent = opt;

                        if (userAns) {
                            btn.disabled = true;
                            if (opt === q.a)
                                btn.classList.add('correct-imm');
                            else if (opt === userAns)
                                btn.classList.add('incorrect-imm');
                        } else {
                            btn.onclick = () => handleAnswer(i, opt, card, q.a);
                        }
                        optsDiv.appendChild(btn);
                    }
                    );

                    card.appendChild(optsDiv);

                    if (userAns) {
                        const fb = document.createElement('div');
                        fb.className = 'feedback-msg';
                        if (userAns === q.a)
                            fb.innerHTML = `<span style="color:var(--neon-green)">✓ Correct</span>`;
                        else
                            fb.innerHTML = `<span style="color:var(--danger)">✕ Incorrect.</span> Correct: <span style="color:var(--neon-green)">${q.a}</span>`;
                        card.appendChild(fb);
                    }

                    el.container.appendChild(card);
                }

                // Nav Buttons
                el.prevBtn.disabled = state.currentPage === 0;
                if (state.currentPage === totalPages - 1) {
                    el.nextBtn.classList.add('hidden');
                    el.submitBtn.classList.remove('hidden');
                } else {
                    el.nextBtn.classList.remove('hidden');
                    el.submitBtn.classList.add('hidden');
                }
            }

            // Immediate Feedback DOM update (no full re-render)
            function handleAnswer(qIndex, selectedOpt, cardElement, correctOpt) {
                if (state.answers[qIndex])
                    return;
                state.answers[qIndex] = selectedOpt;

                const btns = cardElement.querySelectorAll('.opt-btn');
                btns.forEach(btn => {
                    btn.disabled = true;
                    if (btn.textContent === correctOpt)
                        btn.classList.add('correct-imm');
                    else if (btn.textContent === selectedOpt)
                        btn.classList.add('incorrect-imm');
                }
                );

                const fb = document.createElement('div');
                fb.className = 'feedback-msg';
                if (selectedOpt === correctOpt)
                    fb.innerHTML = `<span style="color:var(--neon-green)">✓ Correct</span>`;
                else
                    fb.innerHTML = `<span style="color:var(--danger)">✕ Incorrect.</span> Correct: <span style="color:var(--neon-green)">${correctOpt}</span>`;
                cardElement.appendChild(fb);
            }

            el.prevBtn.onclick = () => {
                if (state.currentPage > 0) {
                    state.currentPage--;
                    renderPage();
                }
            }
            ;
            el.nextBtn.onclick = () => {
                if (state.currentPage < Math.ceil(state.questions.length / QUESTIONS_PER_PAGE) - 1) {
                    state.currentPage++;
                    renderPage();
                }
            }
            ;

            el.submitBtn.onclick = () => {
                const answered = Object.keys(state.answers).length;
                if (answered < state.questions.length) {
                    if (!confirm(`You missed ${state.questions.length - answered} questions. Submit anyway?`))
                        return;
                }
                submitExam();
            }
            ;

            function submitExam() {
                let correct = 0
                  , incorrect = 0;

                state.questions.forEach( (q, i) => {
                    if (state.answers[i] === q.a)
                        correct++;
                    else
                        incorrect++;
                }
                );

                const pct = Math.round((correct / state.questions.length) * 100);

                document.getElementById('finalScore').textContent = `${pct}%`;
                document.getElementById('resultName').textContent = state.studentName;
                document.getElementById('resultCorrect').textContent = correct;
                document.getElementById('resultIncorrect').textContent = incorrect;

                saveHistory(pct, correct);

                el.exam.classList.remove('active');
                el.result.classList.add('active');
            }

            function saveHistory(pct, correct) {
                let h = JSON.parse(localStorage.getItem('netSecHistory') || '[]');
                h.unshift({
                    date: new Date().toLocaleDateString(),
                    name: state.studentName,
                    pct: pct + '%',
                    score: `${correct}/${state.questions.length}`
                });
                if (h.length > 5)
                    h.pop();
                localStorage.setItem('netSecHistory', JSON.stringify(h));

                const hc = document.getElementById('historyContainer');
                hc.innerHTML = h.map(item => `
        <div class="history-item">
          <span><strong>${item.name}</strong> (${item.date})</span>
          <span style="color:var(--neon-green)">${item.pct} [${item.score}]</span>
        </div>
      `).join('');
            }

            document.getElementById('retryBtn').onclick = () => {
                el.result.classList.remove('active');
                el.startBtn.click();
            }
            ;
            document.getElementById('logoutBtn').onclick = () => {
                window.location.reload();
            }
            ;

            // Load history on init
            saveHistory(0, 0);
            document.getElementById('historyContainer').innerHTML = '';
            saveHistory();
        </script>
